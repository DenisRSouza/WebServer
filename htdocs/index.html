<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link rel="stylesheet" href="index.css">
  <body>
    <h1>Central News</h1>
    <h2>Bem-vindo a fonte da verdade absoluta :)</h2>
    <section>
      <article>
        <h3>noticia1</h3>
        <p>aqui vai uma breve descricao da noticia</p>
        <img src="cabra-macabra.jpg" />
      </article>
      <article>
        <h3>noticia2</h3>
        <p>aqui vai uma breve descricao da noticia</p>
        <img src="cabra-macabra.jpg" />
      </article>
      <article>
        <h3>noticia3</h3>
        <p>aqui vai uma breve descricao da noticia</p>
        <img src="cabra-macabra.jpg" />
      </article>
      <button>mostrar mais...</button>
    </section>

    <form>
      <h2>Criar nova noticia</h2>

      <label class = "label-maior" for="titulo">Título</label>
      <br>
      <input
        type="text"
        id="titulo"
        name="titulo"
        placeholder="Baleia baleia baleia"
        required
      />
      <br>
      <br>
      <label for="descricao">Descrição</label>
      <br>
      <input
        type="text"
        id="descricao"
        name="descricao"
        placeholder="Uma baleia baleou outra baleia 😱"
        required
      />
      <br>
      <br>
      <label for="body">Corpo do texto</label>
      <br>
      <input
        type="text"
        class = "label-maior"
        id="body"
        name="body"
        placeholder="Uma balei pegou uma pistola modelo 8 milimetros, alvejou uma colega baleia azul, mirou e atinigiu a coitada."
        required
      />
      <br>
      <br>
      <label for="image">Escolha uma imagem</label>
      <input type="file" id="image" accept="image/*" name="image" required />
      <br>
      <br>
      <button type="submit">Criar notícia</button>
    </form>
  </body>
</html>
